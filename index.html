<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Order | Intelligent Ordering System</title>
    <!-- Use Google Fonts for better typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* Base Reset & Variables */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a28;
            --bg-hover: #22223a;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --accent-2: #00cec9;
            --text: #e8e8f0;
            --text-dim: #8888a8;
            --success: #00b894;
            --danger: #e17055;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Layout */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Language Selector */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Components */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        /* Voice Mic */
        .voice-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(108, 92, 231, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .mic-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .mic-btn.listening {
            background: rgba(225, 112, 85, 0.1);
            border-color: var(--danger);
            color: var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(225, 112, 85, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px transparent;
            }
        }

        .transcript {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            min-height: 40px;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .ai-message {
            margin-top: 10px;
            padding: 10px;
            background: rgba(108, 92, 231, 0.1);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            color: var(--text);
            font-style: italic;
            display: none;
        }

        /* Menu Grid */
        .menu-category {
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .menu-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .menu-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .emoji {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .price {
            color: var(--accent-2);
            font-weight: bold;
            margin-top: 5px;
            display: block;
        }

        /* Cart */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .total-row {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-2);
        }

        .btn-confirm {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-confirm:hover {
            filter: brightness(1.1);
        }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 10% auto;
            padding: 30px;
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.4);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .receipt-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 5px;
        }

        .receipt-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-2);
        }

        .payment-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: var(--radius);
        }

        @keyframes load {
            to {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>AI Voice Ordering</h1>
            <p style="color:var(--text-dim); margin-bottom:15px">Speak naturally to place your order</p>

            <!-- Language Selector -->
            <div class="lang-selector">
                <button class="lang-btn" id="lang-zh" onclick="setLanguage('zh')">🇨🇳 中文</button>
                <button class="lang-btn active" id="lang-en" onclick="setLanguage('en')">🇺🇸 English</button>
                <button class="lang-btn" id="lang-ms" onclick="setLanguage('ms')">🇲🇾 Malay</button>
            </div>
        </header>

        <div class="main-grid">
            <!-- Left: Voice & Menu -->
            <div>
                <div class="card voice-box">
                    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
                    <div id="status">Click to speak...</div>
                    <div class="loader" id="loader"></div>
                    <div class="transcript" id="transcript">...</div>
                    <div class="ai-message" id="aiMessage"></div>

                    <!-- Fallback Input -->
                    <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                        <input type="text" id="manualInput" placeholder="Or type here..."
                            onkeypress="if(event.key==='Enter') manualSubmit()"
                            style="background:var(--bg-secondary); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; width:60%;">
                        <button onclick="manualSubmit()"
                            style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer;">Send</button>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom:15px" id="menuTitle">Menu</h3>
                    <div id="menuContainer">Loading menu...</div>
                </div>
            </div>

            <!-- Right: Cart -->
            <div>
                <div class="card">
                    <h3 style="margin-bottom:15px" id="cartTitle">Cart <button onclick="clearCart()"
                            style="float:right; font-size:0.8rem; background:transparent; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; padding:2px 8px; border-radius:4px;">Clear</button>
                    </h3>
                    <div id="cartItems">
                        <div style="color:var(--text-dim);text-align:center;padding:20px">Empty</div>
                    </div>
                    <div class="total-row">
                        <span id="totalLabel">Total</span>
                        <span id="totalPrice">¥0</span>
                    </div>
                    <button class="btn-confirm" id="checkoutBtn" onclick="showReceipt()">Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content" style="position: relative;">
            <div id="paymentOverlay" class="payment-overlay">
                <div style="font-size:3rem; margin-bottom:20px;">💳</div>
                <div id="paymentStatus">Processing Payment...</div>
                <div
                    style="width:200px; height:4px; background:#333; margin-top:20px; border-radius:2px; overflow:hidden;">
                    <div style="width:0%; height:100%; background:var(--success); animation: load 2s forwards;"></div>
                </div>
            </div>

            <h2 style="text-align:center; margin-bottom:20px; color:var(--text);" id="receiptTitle">🧾 Order Receipt
            </h2>
            <div id="receiptItems"></div>
            <div class="receipt-total">
                <span id="receiptTotalLabel">Total</span>
                <span id="receiptTotal">¥0</span>
            </div>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <button onclick="closeReceipt()" id="cancelBtn"
                    style="flex:1; padding:15px; background:var(--bg-hover); color:var(--text); border:none; border-radius:10px; cursor:pointer;">Cancel</button>
                <button onclick="startPayment()" id="payBtn"
                    style="flex:2; padding:15px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Pay
                    Now</button>
            </div>
        </div>
    </div>

    <script>
        // Session ID for cart persistence
        let sessionId = localStorage.getItem('voice_order_session');
        if (!sessionId) {
            sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('voice_order_session', sessionId);
        }

        let recognition;
        let isListening = false;
        let currentCart = { items: [], total: 0 };
        let currentLang = localStorage.getItem('voice_lang') || 'en';
        let rawMenuData = null;

        const langMap = {
            'zh': { code: 'zh-CN', label: '点击说话...', thinking: '思考中...', empty: '购物车是空的', total: '总计', checkout: '去结算', clear: '清空', receipt: '订单小票', pay: '立即付款', cancel: '取消', menu: '菜单', processing: '正在处理付款...', success: '付款成功！' },
            'en': { code: 'en-US', label: 'Click to speak...', thinking: 'Thinking...', empty: 'Cart is empty', total: 'Total', checkout: 'Checkout', clear: 'Clear', receipt: 'Order Receipt', pay: 'Pay Now', cancel: 'Cancel', menu: 'Menu', processing: 'Processing Payment...', success: 'Payment Successful!' },
            'ms': { code: 'ms-MY', label: 'Klik untuk bercakap...', thinking: 'Sedang berfikir...', empty: 'Bakul kosong', total: 'Jumlah', checkout: 'Pembeyaran', clear: 'Padam', receipt: 'Resit Pesanan', pay: 'Bayar Sekarang', cancel: 'Batal', menu: 'Menu', processing: 'Memproses Pembayaran...', success: 'Pembayaran Berjaya!' }
        };

        async function init() {
            setLanguage(currentLang);
            await loadMenu();
            await loadCart();
            initSpeech();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('voice_lang', lang);

            // Update UI buttons
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');

            // Update Labels
            const strings = langMap[lang];
            document.getElementById('status').innerText = strings.label;
            document.getElementById('menuTitle').innerText = strings.menu;
            document.getElementById('cartTitle').firstChild.textContent = strings.menu + ' ';
            document.getElementById('totalLabel').innerText = strings.total;
            document.getElementById('checkoutBtn').innerText = strings.checkout;
            document.getElementById('receiptTitle').innerText = '🧾 ' + strings.receipt;
            document.getElementById('receiptTotalLabel').innerText = strings.total;
            document.getElementById('payBtn').innerText = strings.pay;
            document.getElementById('cancelBtn').innerText = strings.cancel;
            document.getElementById('paymentStatus').innerText = strings.processing;

            // Re-init recognition if active
            if (recognition) {
                recognition.lang = strings.code;
            }

            // Re-render menu and cart if data available
            if (rawMenuData) renderMenu(rawMenuData);
            if (currentCart) renderCart(currentCart);
        }

        // --- API Calls ---

        async function loadMenu() {
            try {
                const res = await fetch('/api/menu');
                rawMenuData = await res.json();
                renderMenu(rawMenuData);
            } catch (e) {
                console.error("Failed to load menu", e);
                document.getElementById('menuContainer').innerHTML = '<div style="color:red">Error loading menu</div>';
            }
        }

        async function loadCart() {
            try {
                const res = await fetch(`/api/cart?session_id=${sessionId}`);
                const data = await res.json();
                currentCart = data;
                renderCart(data);
            } catch (e) {
                console.error("Failed to load cart", e);
            }
        }

        async function sendVoice(text) {
            showLoader(true);
            try {
                const res = await fetch('/api/process-voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, session_id: sessionId })
                });
                const data = await res.json();

                currentCart = data.cart;
                renderCart(data.cart);

                const aiMsg = document.getElementById('aiMessage');
                if (data.ai_message) {
                    aiMsg.innerText = "🤖 " + data.ai_message;
                    aiMsg.style.display = 'block';
                    speak(data.ai_message, data.language);
                }

                if (data.action === "checkout") {
                    setTimeout(showReceipt, 1500);
                }

            } catch (e) {
                console.error("AI Error", e);
                alert("Error processing request");
            } finally {
                showLoader(false);
            }
        }

        async function clearCart() {
            await fetch('/api/cart/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });
            loadCart();
        }

        async function finalConfirmOrder() {
            try {
                const res = await fetch('/api/confirm-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    const strings = langMap[currentLang];
                    speak(strings.success, currentLang);
                    closeReceipt();
                    renderCart({ items: [], total: 0, item_count: 0 });
                    currentCart = { items: [], total: 0 };
                    alert(strings.success + "\nOrder ID: " + data.order.order_id);
                }
            } catch (e) {
                console.error("Order failed", e);
            }
        }

        // --- Receipt & Payment Logic ---

        function showReceipt() {
            if (!currentCart.items || currentCart.items.length === 0) {
                alert(langMap[currentLang].empty);
                return;
            }

            const list = document.getElementById('receiptItems');
            list.innerHTML = currentCart.items.map(item => `
                <div class="receipt-line">
                    <span>${getName(item)} x${item.quantity}</span>
                    <span>¥${item.subtotal}</span>
                </div>
            `).join('');

            document.getElementById('receiptTotal').innerText = '¥' + currentCart.total;
            document.getElementById('receiptModal').style.display = 'block';
            document.getElementById('paymentOverlay').style.display = 'none';

            const msg = currentLang === 'zh' ? `这是您的订单小票。总共${currentCart.total}元。` :
                (currentLang === 'ms' ? `Ini resit anda. Jumlahnya adalah ${currentCart.total} ringgit.` :
                    `Here is your receipt. The total is ${currentCart.total} yuan.`);
            speak(msg, currentLang);
        }

        function closeReceipt() {
            document.getElementById('receiptModal').style.display = 'none';
        }

        function startPayment() {
            const overlay = document.getElementById('paymentOverlay');
            overlay.style.display = 'flex';
            const strings = langMap[currentLang];
            speak(strings.processing, currentLang);

            setTimeout(() => {
                finalConfirmOrder();
            }, 2000);
        }

        // --- Helpers ---

        function getName(item) {
            if (currentLang === 'zh') return item.name_cn;
            if (currentLang === 'ms') return item.name_ms || item.name_en;
            return item.name_en;
        }

        function getCategoryName(cat) {
            if (currentLang === 'zh') return cat.name_cn;
            if (currentLang === 'ms') return cat.name_ms;
            return cat.name_en;
        }

        // --- Rendering ---

        function renderMenu(menuData) {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            for (const [key, category] of Object.entries(menuData)) {
                const catHeader = document.createElement('div');
                catHeader.className = 'category-title';
                catHeader.innerText = getCategoryName(category);
                container.appendChild(catHeader);

                const grid = document.createElement('div');
                grid.className = 'menu-grid menu-category';
                grid.innerHTML = category.items.map(item => `
                    <div class="menu-item">
                        <span class="emoji">${item.emoji}</span>
                        <div style="font-weight:600">${getName(item)}</div>
                        <div style="font-size:0.75rem;color:var(--text-dim)">${item.id.replace('_', ' ')}</div>
                        <span class="price">¥${item.price}</span>
                    </div>
                `).join('');
                container.appendChild(grid);
            }
        }

        function renderCart(cartData) {
            const container = document.getElementById('cartItems');
            document.getElementById('totalPrice').innerText = '¥' + cartData.total;

            if (!cartData.items || cartData.items.length === 0) {
                container.innerHTML = `<div style="color:var(--text-dim);text-align:center;padding:20px">${langMap[currentLang].empty}</div>`;
                return;
            }

            container.innerHTML = cartData.items.map(item => `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:500">${item.emoji} ${getName(item)}</div>
                    </div>
                    <div>
                        <span style="margin-right:10px; color:var(--text-dim)">x${item.quantity}</span>
                        <span style="color:var(--accent-2); font-weight:600">¥${item.subtotal}</span>
                    </div>
                </div>
            `).join('');
        }

        // --- Speech & UI logic ---

        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('status').innerText = 'Browser does not support Speech API';
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = langMap[currentLang].code;

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('status').innerText = langMap[currentLang].label;
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('listening');
                if (document.getElementById('loader').style.display === 'none') {
                    document.getElementById('status').innerText = langMap[currentLang].label;
                }
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('transcript').innerText = `"${text}"`;
                sendVoice(text);
            };
        }

        function toggleMic() {
            if (isListening) recognition.stop();
            else recognition.start();
        }

        function manualSubmit() {
            const input = document.getElementById('manualInput');
            const text = input.value.trim();
            if (text) {
                document.getElementById('transcript').innerText = `"${text}"`;
                sendVoice(text);
                input.value = '';
            }
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'inline-block' : 'none';
            document.getElementById('status').innerText = show ? langMap[currentLang].thinking : langMap[currentLang].label;
        }

        function speak(text, lang) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = langMap[lang || currentLang].code;
                window.speechSynthesis.speak(u);
            }
        }

        // Start
        init();

    </script>
</body>

</html>
